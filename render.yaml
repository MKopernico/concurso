services:
  - type: web
    name: gameshow
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PIN
        sync: false
      - key: UPLOADS_DIR
        value: /data/uploads
    disk:
      name: gameshow-data
      mountPath: /data
      sizeGB: 1

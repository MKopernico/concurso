<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameShow — Pantalla</title>
<link rel="stylesheet" href="/shared/gameshow-transitions.css">
<link rel="stylesheet" href="/shared/roulette-panel.css">
<style>
/* ═══════════════ RESET & BASE ═══════════════ */
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --bg: #0a0a1a; --surface: #12122a; --border: #1e1e3a;
    --cyan: #00d4ff; --gold: #fbbf24; --danger: #ef4444; --green: #22c55e;
    --text: #f0f0f0; --text2: #8888aa;
    --glow-cyan: 0 0 20px rgba(0,212,255,.4), 0 0 60px rgba(0,212,255,.15);
    --glow-gold: 0 0 20px rgba(251,191,36,.4), 0 0 60px rgba(251,191,36,.15);
}
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }

/* ═══════════════ LAYOUT ═══════════════ */
#app { width: 100%; height: 100%; position: relative; }

.phase { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column;
    opacity: 0; pointer-events: none; z-index: 1;
    transition: opacity 1s ease-in-out; }
.phase.active { opacity: 1; pointer-events: auto; z-index: 2; }

/* ═══════════════ LOBBY / WAITING ═══════════════ */
#phase-lobby { background: transparent; }
.lobby-title { font-size: clamp(36px, 6vw, 72px); font-weight: 800; letter-spacing: 6px; text-transform: uppercase;
    background: linear-gradient(135deg, var(--cyan), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: none; filter: drop-shadow(0 0 30px rgba(0,212,255,.3)); animation: pulse-glow 3s ease-in-out infinite; }
.lobby-sub { font-size: 28px; color: var(--text2); margin-top: 20px; animation: fade-blink 2s ease-in-out infinite; }
@keyframes pulse-glow { 0%,100% { filter: drop-shadow(0 0 30px rgba(0,212,255,.3)); } 50% { filter: drop-shadow(0 0 50px rgba(0,212,255,.5)); } }
@keyframes fade-blink { 0%,100% { opacity: .5; } 50% { opacity: 1; } }

/* ═══════════════ ROUND INTRO ═══════════════ */
#phase-round-intro { background: transparent; }

/* ═══════════════ TIMER BAR (top) ═══════════════ */
.timer-strip { position: absolute; top: 0; left: 0; right: 0; height: 8px; z-index: 50; background: var(--surface); }
.timer-strip-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--green)); transition: width .3s linear; border-radius: 0 4px 4px 0; }
.timer-strip-fill.danger { background: linear-gradient(90deg, var(--danger), #ff6b6b); animation: timer-flash .5s infinite; }
@keyframes timer-flash { 0%,100% { opacity: 1; } 50% { opacity: .6; } }

.timer-big { position: absolute; top: 20px; right: 40px; font-size: clamp(36px, 5vw, 64px); font-weight: 800; font-variant-numeric: tabular-nums;
    color: var(--cyan); z-index: 51; text-shadow: 0 0 20px #00d4ff, 0 2px 4px rgba(0,0,0,.8); }
.timer-big.danger { color: var(--danger); text-shadow: 0 0 20px rgba(239,68,68,.5); }

/* ═══════════════ ROUND LABEL ═══════════════ */
.round-label { display: none; }

/* ═══════════════ QUESTION PHASE ═══════════════ */
/* Three-zone layout: header (logo+timer ~12vh), content (flex:1 centered), footer margin (~5vh) */
#phase-question { position: absolute; inset: 0; height: 100vh;
    padding: clamp(100px, 14vh, 160px) clamp(1rem, 3vw, 3rem) clamp(3vh, 5vh, 6vh);
    display: flex; flex-direction: column; justify-content: center; gap: clamp(10px, 2vh, 24px); box-sizing: border-box; }
.q-statement { flex-shrink: 0; max-height: 28vh; overflow: hidden;
    font-size: clamp(1.4rem, 2.8vw, 2.4rem); font-weight: 700; text-align: center; line-height: 1.4;
    width: 100%; margin: 0 auto;
    padding: clamp(16px, 2vh, 28px) clamp(20px, 3vw, 40px);
    background: rgba(0,0,0,.60); border-radius: 16px; color: #fff; backdrop-filter: blur(6px); }
.q-media { max-width: min(500px, 50vw); max-height: 20vh; border-radius: 16px; margin: 10px auto 0; box-shadow: var(--glow-cyan); object-fit: contain; flex-shrink: 0; }

/* Options grid for multirespuesta — 2×2, fills remaining space */
.q-options { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto auto;
    gap: clamp(10px, 1.5vh, 20px); padding: clamp(10px, 2vh, 24px) 0;
    width: 100%; margin: 0 auto; align-content: center; }
.q-opt { height: auto; min-height: 56px; display: flex; align-items: center; gap: 16px;
    font-size: clamp(1.1rem, 2vw, 1.9rem); font-weight: 600; line-height: 1.3; overflow: hidden;
    padding: clamp(14px, 2vh, 28px) clamp(16px, 2vw, 32px);
    background: rgba(0,0,0,.60); border: 2px solid rgba(255,255,255,.15); border-radius: 16px;
    color: #fff; backdrop-filter: blur(6px); transition: all 1s ease-in-out; }
.q-opt .opt-letter { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,.1); display: flex;
    align-items: center; justify-content: center; font-size: 18px; font-weight: 800; color: var(--cyan); flex-shrink: 0; }

/* Correct/wrong reveal states — in-place on q-opt */
.q-opt.correct { border-color: var(--green); background: rgba(34,197,94,.30); box-shadow: 0 0 20px rgba(34,197,94,.3); }
.q-opt.correct .opt-letter { background: var(--green); color: #fff; }
.q-opt.dimmed { opacity: 0.3; }

/* Adaptive grid for 2, 3, 5+ options */
.q-options.cols-1 { grid-template-columns: 1fr; }
.q-options.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

/* Buzzer queue */
.buzzer-queue { margin-top: 40px; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; justify-content: center; }
.buzzer-chip { background: var(--surface); border: 2px solid var(--gold); border-radius: 40px; padding: 12px 28px;
    font-size: 24px; font-weight: 700; color: var(--gold); animation: chip-in .3s ease; }
.buzzer-chip:first-child { background: linear-gradient(135deg, #78350f, #a16207); border-color: var(--gold);
    color: #fff; font-size: 28px; box-shadow: var(--glow-gold); }
@keyframes chip-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

/* Precio justo */
.precio-screen { display: flex; flex-direction: column; align-items: center; gap: clamp(12px, 2vh, 24px); width: 100%; }
.precio-screen-img { max-width: min(500px, 55vw); max-height: 38vh; border-radius: 16px; border: 2px solid rgba(255,255,255,.12);
    box-shadow: 0 8px 40px rgba(0,0,0,.5); object-fit: contain; }
.precio-screen-value { font-size: clamp(2.5rem, 6vw, 5rem); font-weight: 800; color: var(--text2); text-align: center;
    padding: 12px 40px; border-radius: 16px; background: rgba(0,0,0,.40); backdrop-filter: blur(6px); }
.precio-screen-value.revealed { color: var(--green); text-shadow: 0 0 30px rgba(34,197,94,.4);
    animation: precio-reveal .6s cubic-bezier(.34,1.56,.64,1); }
@keyframes precio-reveal { from { opacity: 0; transform: scale(.5); } to { opacity: 1; transform: scale(1); } }
.precio-screen-winner { font-size: clamp(1.4rem, 3vw, 2.2rem); font-weight: 700; color: var(--gold); text-align: center;
    padding: 12px 32px; border-radius: 16px; background: rgba(251,191,36,.12); border: 2px solid var(--gold);
    box-shadow: var(--glow-gold); animation: precio-reveal .6s cubic-bezier(.34,1.56,.64,1) .3s backwards; }
.precio-screen-nobody { font-size: clamp(1.2rem, 2.5vw, 1.8rem); color: var(--danger); text-align: center; }
.precio-answered-count { font-size: 18px; color: var(--text2); text-align: center; }
.price-answers { display: flex; gap: 24px; margin-top: 40px; flex-wrap: wrap; justify-content: center; }
.price-chip { background: var(--surface); border: 2px solid var(--border); border-radius: 16px; padding: 16px 28px;
    font-size: 22px; font-weight: 600; text-align: center; min-width: 160px; }
.price-chip .team-name { color: var(--text2); font-size: 16px; margin-bottom: 4px; }
.price-chip .team-value { color: var(--cyan); font-size: 32px; font-weight: 800; }

/* Boom ordering */
.boom-items { display: flex; flex-direction: column; gap: clamp(8px, 1.2vh, 16px); width: 100%; }
.boom-items .boom-item { background: rgba(0,0,0,.60); border: 2px solid rgba(255,255,255,.15); border-radius: 16px;
    padding: clamp(12px, 1.8vh, 24px) clamp(16px, 2vw, 32px);
    font-size: clamp(1.1rem, 2vw, 1.9rem); font-weight: 600; display: flex; align-items: center; gap: 16px;
    color: #fff; backdrop-filter: blur(6px); transition: all .4s ease; }
.boom-items .boom-item .boom-num { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,.1); color: var(--cyan);
    display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; flex-shrink: 0; }
.boom-items .boom-item.correct { border-color: var(--green); background: rgba(34,197,94,.30); }
.boom-items .boom-item.correct .boom-num { background: var(--green); color: #fff; }
.boom-items .boom-arrow { text-align: center; font-size: 24px; color: var(--green); line-height: 1; }

/* ═══════════════ ANSWER REVEALED ═══════════════ */
#phase-revealed { position: absolute; inset: 0; height: 100vh;
    padding: clamp(100px, 14vh, 160px) clamp(1rem, 3vw, 3rem) clamp(3vh, 5vh, 6vh);
    display: flex; flex-direction: column; justify-content: center; gap: clamp(10px, 2vh, 24px); box-sizing: border-box; background: transparent; }
.revealed-label { font-size: 22px; font-weight: 700; text-transform: uppercase; letter-spacing: 4px;
    color: var(--green); text-shadow: 0 0 20px rgba(34,197,94,.4); flex-shrink: 0; text-align: center; margin-bottom: 8px; }
.revealed-answer { flex-shrink: 0; max-height: 28vh; overflow: hidden;
    font-size: clamp(1.4rem, 2.8vw, 2.4rem); font-weight: 800; text-align: center; line-height: 1.4;
    width: 88%; margin: 0 auto;
    padding: clamp(16px, 2vh, 28px) clamp(20px, 3vw, 40px);
    background: rgba(0,0,0,.60); border-radius: 16px; color: var(--green); backdrop-filter: blur(6px);
    animation: reveal-pop .6s cubic-bezier(.34,1.56,.64,1); }
@keyframes reveal-pop { from { opacity: 0; transform: scale(.5); } to { opacity: 1; transform: scale(1); } }

/* Options with correct/wrong highlighting — same 2×2 layout */
.revealed-options { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
    gap: clamp(10px, 1.5vh, 20px); padding: clamp(10px, 2vh, 24px) 0;
    width: 88%; margin: 0 auto; }
.rev-opt { height: 100%; min-height: 56px; display: flex; align-items: center; gap: 16px;
    font-size: clamp(1rem, 1.9vw, 1.7rem); font-weight: 600; line-height: 1.3; overflow: hidden;
    padding: clamp(8px, 1.2vh, 16px) clamp(12px, 2vw, 24px);
    background: rgba(0,0,0,.60); border: 2px solid rgba(255,255,255,.15); border-radius: 16px;
    color: #fff; backdrop-filter: blur(6px); transition: all 1s ease-in-out; }
.rev-opt.correct { border-color: var(--green); background: rgba(34,197,94,.25); }
.rev-opt .opt-letter { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,.1); display: flex;
    align-items: center; justify-content: center; font-size: 18px; font-weight: 800; color: var(--cyan); flex-shrink: 0; }
.rev-opt.correct .opt-letter { background: var(--green); color: #fff; }

/* ═══════════════ SCOREBOARD (full-phase + overlay) ═══════════════ */
#phase-scoreboard { padding: 60px; background: radial-gradient(ellipse at center, #1a1a2e 0%, var(--bg) 70%); }
.sb-title { font-size: 42px; font-weight: 800; text-transform: uppercase; letter-spacing: 4px;
    color: var(--gold); margin-bottom: 40px; text-shadow: var(--glow-gold); }
.sb-table { width: 100%; max-width: 900px; }
.sb-row { display: flex; align-items: center; padding: 16px 24px; border-radius: 14px; margin-bottom: 14px;
    background: rgba(18,18,42,.85); border: 1px solid rgba(255,255,255,.06); transition: all .4s ease;
    animation: sb-slide-in .5s ease backwards; backdrop-filter: blur(8px);
    box-shadow: 0 0 12px 3px rgba(0,212,255,.15), 0 0 24px 6px rgba(0,212,255,.06); }
.sb-row:nth-child(1) { background: linear-gradient(135deg, rgba(251,191,36,.18), rgba(251,191,36,.06));
    border-color: rgba(251,191,36,.2);
    box-shadow: 0 0 15px 4px rgba(255,200,0,.4), 0 0 30px 8px rgba(0,212,255,.15); }
.sb-row:nth-child(1) .sb-pos { background: var(--gold); color: var(--bg); }
.sb-row:nth-child(2) { animation-delay: .1s; }
.sb-row:nth-child(3) { animation-delay: .2s; }
.sb-row:nth-child(4) { animation-delay: .3s; }
.sb-row:nth-child(5) { animation-delay: .35s; }
.sb-row:nth-child(6) { animation-delay: .4s; }
@keyframes sb-slide-in { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
.sb-pos { width: 48px; height: 48px; border-radius: 50%; background: var(--border); display: flex;
    align-items: center; justify-content: center; font-size: 22px; font-weight: 800; color: var(--cyan); flex-shrink: 0; }
.sb-photo { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--border); margin-left: 12px; }
.sb-name { flex: 1; font-size: 28px; font-weight: 700; margin-left: 20px; }
.sb-score { font-size: 36px; font-weight: 800; color: var(--cyan); font-variant-numeric: tabular-nums; text-shadow: var(--glow-cyan); }
.sb-bar { flex: 0 0 200px; height: 12px; background: var(--border); border-radius: 6px; margin: 0 24px; overflow: hidden; }
.sb-bar-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--gold)); border-radius: 6px; transition: width .6s ease; }

/* Scoreboard overlay (global, z-index above everything) */
#scoreboardOverlay { z-index: 80; }
#scoreboardOverlay .sb-overlay-inner { width: 90%; max-width: 900px; max-height: 80vh; overflow-y: auto; }

/* ═══════════════ WAITING ═══════════════ */
#phase-waiting { background: transparent; }
#phase-waiting .gs-waiting-logo { max-height: 180px; max-width: 400px; object-fit: contain; filter: drop-shadow(0 0 30px rgba(0,0,0,.5)); }

/* ═══════════════ PRE-COUNTDOWN DARK OVERLAY ═══════════════ */
.timer-overlay { position: fixed; inset: 0; z-index: 54; background: rgba(0,0,0,.80); pointer-events: none;
    opacity: 0; transition: opacity .6s ease; }
.timer-overlay.active { opacity: 1; }

/* ═══════════════ ROUND END ═══════════════ */
#phase-round-end { position: fixed; inset: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,.50); z-index: 60; }
.round-end-content { display: flex; flex-direction: column; align-items: center; justify-content: center;
    animation: round-end-in .8s cubic-bezier(.34,1.56,.64,1); }
.round-end-title { font-size: clamp(3rem, 8vw, 7rem); font-weight: 800; text-align: center; text-transform: uppercase;
    color: #fff; }
@keyframes round-end-in { 0% { opacity: 0; transform: scale(.6); } 100% { opacity: 1; transform: scale(1); } }

/* ═══════════════ PRE-COUNTDOWN ═══════════════ */
.pre-countdown { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 55;
    font-size: clamp(120px, 20vw, 240px); font-weight: 800; color: #fff; text-shadow: 0 0 40px var(--cyan), 0 0 80px rgba(0,212,255,.4), 0 4px 8px rgba(0,0,0,.9);
    opacity: 0; pointer-events: none; transition: opacity .3s ease; }
.pre-countdown.active { opacity: 1; animation: countPop 1s ease-out; }
@keyframes countPop { 0% { transform: translate(-50%,-50%) scale(1.6); opacity: .5; } 30% { transform: translate(-50%,-50%) scale(1); opacity: 1; } 100% { transform: translate(-50%,-50%) scale(.95); opacity: .8; } }

/* ═══════════════ NOTIFICATION TOAST ═══════════════ */
.notif { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 100;
    background: linear-gradient(135deg, #1e1e3a, #12122a); border: 2px solid var(--gold); border-radius: 16px;
    padding: 16px 36px; font-size: 24px; font-weight: 700; color: var(--gold); box-shadow: var(--glow-gold);
    opacity: 0; transition: opacity .4s ease, transform .4s ease; pointer-events: none; }
.notif.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ═══════════════ SCOREBOARD MINI — hidden during question/reveal ═══════════════ */
.mini-scores { display: none; }
.mini-chip { background: rgba(18,18,42,.85); border: 1px solid var(--border); border-radius: 20px;
    padding: 6px 16px; font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px;
    backdrop-filter: blur(8px); }
.mini-chip .mc-name { color: var(--text2); }
.mini-chip .mc-score { color: var(--cyan); font-weight: 800; }
.mini-chip.first .mc-score { color: var(--gold); }

/* ═══════════════ IMAGE GRID ═══════════════ */
.img-grid-wrap { position: relative; width: min(500px, 60vh); height: min(500px, 60vh); margin-top: 30px; border-radius: 16px; overflow: hidden; box-shadow: var(--glow-cyan); }
.img-grid-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.img-grid-overlay { position: absolute; inset: 0; display: grid; }
.img-grid-cell { background: var(--surface); border: 1px solid var(--border); transition: opacity .5s ease; display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 800; color: var(--text2); }
.img-grid-cell.revealed { opacity: 0; pointer-events: none; }

/* ═══════════════ LETTER PANEL (RULETA) ═══════════════ */
.letter-panel { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 40px; max-width: 1000px; }
.letter-cell { width: 56px; height: 64px; background: var(--surface); border: 2px solid var(--border); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 800; color: var(--cyan);
    transition: all .3s ease; text-transform: uppercase; }
.letter-cell.hidden { color: transparent; background: linear-gradient(135deg, #1e1e3a, #12122a); border-color: var(--cyan); box-shadow: 0 0 8px rgba(0,212,255,.2); }
.letter-cell.space { background: transparent; border-color: transparent; box-shadow: none; }
.letter-cell.revealed { animation: letter-flip .4s ease; }
@keyframes letter-flip { 0% { transform: scaleY(0); } 100% { transform: scaleY(1); } }

/* ═══════════════ TEAM RESULTS OVERLAY ═══════════════ */
.team-results-overlay { position: absolute; inset: 0; z-index: 60; display: flex; align-items: center; justify-content: center;
    background: rgba(10,10,26,.85); backdrop-filter: blur(10px);
    opacity: 0; transform: scale(.95); transition: opacity .5s ease, transform .5s ease; pointer-events: none; }
.team-results-overlay.active { opacity: 1; transform: scale(1); pointer-events: auto; }
.tr-container { width: 90%; max-width: 900px; max-height: 80vh; overflow-y: auto; }
.tr-title { font-size: 32px; font-weight: 800; text-transform: uppercase; letter-spacing: 3px;
    color: var(--cyan); margin-bottom: 30px; text-align: center; text-shadow: var(--glow-cyan); }
.tr-card { display: flex; align-items: center; gap: 20px; padding: 18px 28px; border-radius: 14px; margin-bottom: 12px;
    background: rgba(10,10,26,.85); backdrop-filter: blur(8px); border: 1px solid var(--border);
    animation: tr-slide-in .4s ease backwards; }
.tr-card:nth-child(2) { animation-delay: .05s; }
.tr-card:nth-child(3) { animation-delay: .1s; }
.tr-card:nth-child(4) { animation-delay: .15s; }
.tr-card:nth-child(5) { animation-delay: .2s; }
.tr-card:nth-child(6) { animation-delay: .25s; }
.tr-card:nth-child(7) { animation-delay: .3s; }
.tr-card:nth-child(8) { animation-delay: .35s; }
@keyframes tr-slide-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.tr-card .tr-icon { font-size: 36px; flex-shrink: 0; }
.tr-card .tr-photo { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--border); }
.tr-card .tr-name { font-size: 26px; font-weight: 700; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tr-card .tr-answer-text { font-size: 20px; color: var(--text2); max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tr-card .tr-pts { font-size: 28px; font-weight: 800; width: 100px; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; }
.tr-card .tr-pts.positive { color: var(--green); text-shadow: 0 0 10px rgba(34,197,94,.3); }
.tr-card .tr-pts.negative { color: var(--danger); text-shadow: 0 0 10px rgba(239,68,68,.3); }
.tr-card .tr-pts.zero { color: var(--text2); }
.tr-card.correct { border-color: var(--green); background: linear-gradient(135deg, rgba(34,197,94,.08), transparent); }
.tr-card.wrong { border-color: var(--danger); background: linear-gradient(135deg, rgba(239,68,68,.05), transparent); opacity: .7; }
.tr-card.no-answer { opacity: .4; }

/* ═══════════════ MENU GRID (HOME/CATEGORY) ═══════════════ */
.screen-menu { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; padding: 40px; transition: opacity .5s ease; }
.screen-menu.fade-out { opacity: 0; }
.screen-menu-logo { max-height: 240px; max-width: 540px; object-fit: contain; margin-bottom: 36px; filter: drop-shadow(0 4px 20px rgba(0,0,0,.6)); }
.screen-menu-grid { display: flex; flex-wrap: wrap; justify-content: center; align-items: flex-start; gap: 40px; max-width: 1000px; }
.screen-menu-item { background: none; border: none;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; text-align: center;
    transition: all .4s ease; animation: menu-item-in .5s ease backwards; padding: 20px; }
.screen-menu-item img { max-width: 100%; object-fit: contain; filter: drop-shadow(0 4px 16px rgba(0,0,0,.5)); }
.screen-menu-item .smi-label { font-size: 20px; font-weight: 700; color: var(--text); text-shadow: 0 2px 8px rgba(0,0,0,.6); }
.screen-menu-item .smi-sub { font-size: 14px; color: var(--text2); text-shadow: 0 1px 4px rgba(0,0,0,.5); }
.screen-menu-item.completed { opacity: .35; }
.screen-menu-item.completed .smi-label { text-decoration: line-through; color: var(--text2); }
@keyframes menu-item-in { from { opacity: 0; transform: translateY(30px) scale(.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
.screen-menu-item:nth-child(1) { animation-delay: 0s; }
.screen-menu-item:nth-child(2) { animation-delay: .1s; }
.screen-menu-item:nth-child(3) { animation-delay: .15s; }
.screen-menu-item:nth-child(4) { animation-delay: .2s; }
.screen-menu-item:nth-child(5) { animation-delay: .25s; }
.screen-menu-item:nth-child(6) { animation-delay: .3s; }
/* Category logos: scale by count */
.screen-menu-grid.menu-categories[data-count="1"] .screen-menu-item img { max-height: 260px; }
.screen-menu-grid.menu-categories[data-count="2"] .screen-menu-item img { max-height: 220px; }
.screen-menu-grid.menu-categories[data-count="3"] .screen-menu-item img { max-height: 190px; }
.screen-menu-grid.menu-categories[data-count="4"] .screen-menu-item img { max-height: 160px; }
.screen-menu-grid.menu-categories[data-count="5"] .screen-menu-item img,
.screen-menu-grid.menu-categories[data-count="6"] .screen-menu-item img { max-height: 130px; }
/* Round logos: scale by count */
.screen-menu-grid.menu-rounds[data-count="1"] .screen-menu-item img { max-height: 200px; }
.screen-menu-grid.menu-rounds[data-count="2"] .screen-menu-item img { max-height: 170px; }
.screen-menu-grid.menu-rounds[data-count="3"] .screen-menu-item img { max-height: 140px; }
.screen-menu-grid.menu-rounds[data-count="4"] .screen-menu-item img { max-height: 120px; }
.screen-menu-grid.menu-rounds[data-count="5"] .screen-menu-item img,
.screen-menu-grid.menu-rounds[data-count="6"] .screen-menu-item img { max-height: 100px; }
/* Adaptive widths by count */
.screen-menu-grid[data-count="1"] .screen-menu-item { width: 320px; }
.screen-menu-grid[data-count="2"] .screen-menu-item { width: 280px; }
.screen-menu-grid[data-count="3"] .screen-menu-item { width: 240px; }
.screen-menu-grid[data-count="4"] .screen-menu-item { width: 220px; }
.screen-menu-grid[data-count="5"] .screen-menu-item,
.screen-menu-grid[data-count="6"] .screen-menu-item { width: 180px; }
/* Adaptive gap by count */
.screen-menu-grid[data-count="1"],
.screen-menu-grid[data-count="2"] { gap: 60px; }
.screen-menu-grid[data-count="3"] { gap: 50px; }
.screen-menu-grid[data-count="4"] { gap: 40px; }
.screen-menu-grid[data-count="5"],
.screen-menu-grid[data-count="6"] { gap: 30px; }

/* ═══════════════ PULSADOR SCREEN ═══════════════ */
.pulsador-screen-status { font-size: clamp(2rem, 5vw, 4rem); font-weight: 800; text-transform: uppercase; letter-spacing: 4px; text-align: center; padding: 20px 60px; border-radius: 20px; }
.pulsador-screen-status.ps-open { color: #fff; background: rgba(34,197,94,.25); border: 2px solid var(--green); text-shadow: 0 0 30px rgba(34,197,94,.5); box-shadow: 0 0 40px rgba(34,197,94,.2); }
.pulsador-screen-status.ps-closed { color: #fff; background: rgba(239,68,68,.25); border: 2px solid var(--danger); text-shadow: 0 0 30px rgba(239,68,68,.5); box-shadow: 0 0 40px rgba(239,68,68,.2); }
.pulsador-screen-queue { display: flex; flex-direction: column; gap: clamp(10px, 1.5vh, 20px); margin-top: 40px; width: 80%; max-width: 700px; }
.psq-item { display: flex; align-items: center; gap: 20px; padding: clamp(14px, 2vh, 24px) clamp(20px, 3vw, 36px);
    background: rgba(0,0,0,.60); border: 2px solid rgba(255,255,255,.15); border-radius: 16px;
    backdrop-filter: blur(6px); animation: psq-in .4s ease backwards; }
.psq-item:first-child { border-color: var(--gold); background: linear-gradient(135deg, rgba(251,191,36,.15), rgba(0,0,0,.60)); box-shadow: var(--glow-gold); }
.psq-item:nth-child(1) { animation-delay: 0s; }
.psq-item:nth-child(2) { animation-delay: .08s; }
.psq-item:nth-child(3) { animation-delay: .12s; }
.psq-item:nth-child(4) { animation-delay: .16s; }
.psq-item:nth-child(5) { animation-delay: .2s; }
@keyframes psq-in { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: none; } }
.psq-pos { font-size: clamp(1.5rem, 3vw, 2.5rem); font-weight: 800; color: var(--gold); min-width: 60px; text-align: center; }
.psq-item:first-child .psq-pos { font-size: clamp(2rem, 4vw, 3rem); }
.psq-photo { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--surface); }
.psq-name { flex: 1; font-size: clamp(1.2rem, 2.5vw, 2rem); font-weight: 700; color: #fff; }
.psq-time { font-size: clamp(1rem, 2vw, 1.5rem); color: var(--cyan); font-weight: 600; font-variant-numeric: tabular-nums; }
.pulsador-screen-empty { font-size: clamp(1.2rem, 2.5vw, 1.8rem); color: var(--text2); text-align: center; margin-top: 60px; }

/* ═══════════════ CONNECTION STATUS ═══════════════ */
.conn-dot { position: fixed; bottom: 12px; right: 12px; width: 14px; height: 14px; border-radius: 50%;
    background: var(--green); z-index: 200; display: none; transition: background .3s; }
.conn-dot.disconnected { display: block; background: var(--danger); animation: blink-dot 1s infinite; }
@keyframes blink-dot { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

/* Fullscreen button */
.fs-btn { position: fixed; bottom: 16px; right: 16px; z-index: 200; width: 48px; height: 48px; border-radius: 50%; background: rgba(18,18,42,.7); border: 1px solid var(--border); color: var(--text2); font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); transition: .2s; }
.fs-btn:hover { color: var(--cyan); border-color: var(--cyan); }
.fs-btn.hidden { display: none; }

/* ═══════════════ GAME LOGO ═══════════════ */
.game-logo { max-height: 120px; max-width: 300px; object-fit: contain; margin-bottom: 20px; filter: drop-shadow(0 0 20px rgba(0,0,0,.5)); }
.round-logo { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); min-height: 120px; max-height: 140px; max-width: 400px; object-fit: contain; z-index: 52; filter: drop-shadow(0 0 10px rgba(0,0,0,.5)); }

/* ═══════════════ ANIMATED BACKGROUNDS ═══════════════ */
.bg-layer { position: fixed; inset: 0; z-index: 0; pointer-events: none; transition: background-image .6s ease, background-color .6s ease, opacity .5s ease; }
.bg-gradient-anim { animation: bgShift 12s ease-in-out infinite; background-size: 300% 300%; }
@keyframes bgShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
.bg-image-cover { background-size: cover; background-position: center; }

/* ═══════════════ PARTICLES ═══════════════ */
.particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
.particle { position: absolute; border-radius: 50%; opacity: 0; animation: particleFloat linear infinite; }
@keyframes particleFloat {
    0% { opacity: 0; transform: translateY(100vh) scale(0); }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-10vh) scale(1); }
}
</style>
</head>
<body>
<div class="bg-layer" id="bgLayer"></div>
<div class="particles" id="particles"></div>
<div id="app">
    <!-- Timer strip -->
    <div class="timer-strip" id="timerStrip" style="display:none">
        <div class="timer-strip-fill" id="timerFill"></div>
    </div>
    <div class="timer-big" id="timerBig" style="display:none">00:00</div>
    <div class="round-label" id="roundLabel"></div>
    <img class="round-logo" id="roundLogo" style="display:none">

    <!-- LOBBY -->
    <div class="phase active" id="phase-lobby">
        <img class="game-logo" id="gameLogo" style="display:none">
        <div class="lobby-title" id="lobbyTitle">GAMESHOW</div>
        <div class="lobby-sub">Esperando inicio...</div>
    </div>

    <!-- ROUND INTRO -->
    <div class="phase" id="phase-round-intro">
        <div class="gs-intro-content">
            <img class="gs-intro-logo" id="introLogo" style="display:none">
        </div>
    </div>

    <!-- QUESTION -->
    <div class="phase" id="phase-question">
        <div class="q-statement" id="qStatement"></div>
        <img class="q-media" id="qMedia" style="display:none">
        <div class="q-options" id="qOptions" style="display:none"></div>
        <div class="buzzer-queue" id="buzzerQueue" style="display:none"></div>
        <div id="pulsadorScreen" style="display:none; width:100%; display:none; flex-direction:column; align-items:center;"></div>
        <div class="price-answers" id="priceAnswers" style="display:none"></div>
        <div class="boom-items" id="boomItems" style="display:none"></div>
        <div id="ruletaScreenPanel" style="display:none; position:absolute; inset:0;"></div>
        <div class="img-grid-wrap" id="imgGrid" style="display:none">
            <img id="imgGridImg">
            <div class="img-grid-overlay" id="imgGridOverlay"></div>
        </div>
        <div class="letter-panel" id="letterPanel" style="display:none"></div>
        <div class="mini-scores" id="miniScores"></div>
    </div>

    <!-- ANSWER REVEALED -->
    <div class="phase" id="phase-revealed">
        <div class="revealed-label">RESPUESTA CORRECTA</div>
        <div class="revealed-answer" id="revAnswer"></div>
        <div class="revealed-options" id="revOptions" style="display:none"></div>
        <div class="mini-scores" id="miniScoresRev"></div>
    </div>

    <!-- TEAM RESULTS OVERLAY -->
    <div class="team-results-overlay" id="teamResultsOverlay">
        <div class="tr-container">
            <div class="tr-title">&#128101; Resultados</div>
            <div id="teamResultsCards"></div>
        </div>
    </div>

    <!-- SCOREBOARD OVERLAY (global) -->
    <div class="gs-scoreboard-overlay" id="scoreboardOverlay">
        <div class="sb-overlay-inner">
            <div class="sb-title" style="text-align:center;">MARCADOR</div>
            <div class="sb-table" id="sbOverlayTable"></div>
        </div>
    </div>

    <!-- SCOREBOARD (phase, legacy fallback) -->
    <div class="phase" id="phase-scoreboard">
        <div class="sb-title">MARCADOR</div>
        <div class="sb-table" id="sbTable"></div>
    </div>

    <!-- WAITING -->
    <div class="phase" id="phase-waiting">
        <img class="gs-waiting-logo" id="waitingLogo" style="display:none">
    </div>

    <!-- ROUND END -->
    <div class="phase" id="phase-round-end">
        <div class="round-end-content">
            <div class="round-end-title">¡FIN DE LA RONDA!</div>
        </div>
    </div>

    <!-- Timer dark overlay -->
    <div class="timer-overlay" id="timerOverlay"></div>

    <!-- Pre-countdown overlay -->
    <div class="pre-countdown" id="preCountdown"></div>

    <!-- Notification toast -->
    <div class="notif" id="notif"></div>
    <div class="conn-dot" id="connDot" title="Desconectado"></div>
    <button class="fs-btn" id="fsBtn" onclick="toggleFullscreen()" title="Pantalla completa">&#9974;</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/shared/gameshow-transitions.js"></script>
<script src="/shared/roulette-panel.js"></script>
<script>
(function() {
'use strict';

var GSA = GameShowShared.Animations;
var GST = GameShowShared.Transitions;

// ═══════════════ STATE ═══════════════
var gameId = location.pathname.split('/').filter(Boolean)[1] || '';
var ps = null;
var socket = null;
var prevPhaseKey = 'lobby';
var prevOptionsRevealed = false;
var prevQuestionIdx = -1;

// ═══════════════ CONNECT ═══════════════
function connect() {
    if (!gameId) { document.getElementById('lobbyTitle').textContent = 'Sin juego'; return; }
    socket = io({ query: { gameId: gameId } });

    socket.on('connect', function() {
        document.getElementById('connDot').classList.remove('disconnected');
        socket.emit('screen:join');
    });

    socket.on('disconnect', function() {
        document.getElementById('connDot').classList.add('disconnected');
    });

    socket.on('game:player_sync', onSync);
    socket.on('game:timer_tick', function(d) {
        if (ps) { ps.timer.remaining = d.remaining; ps.timer.total = d.total; }
        renderTimer();
    });
    socket.on('actualizar_pulsador_lista', function(cola) {
        if (ps) ps.colaPulsador = cola;
        renderBuzzerQueue();
    });
    socket.on('estado_pulsador_cambio', function(d) {
        if (ps) { ps.pulsadorActivo = d.activo; ps.colaPulsador = d.cola; }
        renderBuzzerQueue();
    });

    // Roulette events
    socket.on('game:letter_revealed', function(d) {
        if (!ps) return;
        ps.rouletteRevealed = d.revealedLetters || [];
        var container = document.getElementById('ruletaScreenPanel');
        if (container && container.style.display !== 'none') {
            RoulettePanel.revealLetter(container, d.letter);
        }
    });
    socket.on('game:roulette_solved', function(d) {
        if (!ps) return;
        ps.rouletteSolved = true;
        var container = document.getElementById('ruletaScreenPanel');
        if (container && container.style.display !== 'none') {
            RoulettePanel.solveAll(container, d.phrase);
        }
    });
    socket.on('game:panel_visible', function() {
        if (!ps) return;
        ps.roulettePanelVisible = true;
        var container = document.getElementById('ruletaScreenPanel');
        if (container) { container.style.opacity = '1'; container.style.transition = 'opacity 0.6s ease'; }
    });

    fetch('/api/games/' + gameId).then(function(r) { return r.json(); }).then(function(g) {
        if (g && g.name) document.getElementById('lobbyTitle').textContent = g.name;
        if (g && g.theme) applyTheme(g.theme);
    }).catch(function() {});
}

// ═══════════════ SYNC HANDLER ═══════════════
function onSync(data) {
    var prevPhase = ps ? ps.phase : 'lobby';
    var prevOptRevealed = ps ? ps.optionsRevealed : false;
    var prevQIdx = ps ? ps.questionIdx : -1;
    ps = data;
    if (data.gameTheme) applyTheme(data.gameTheme);
    if (data.roundTheme) applyRoundTheme(data.roundTheme);

    // Detect transitions
    var phaseChanged = data.phase !== prevPhase;
    var newQuestion = data.questionIdx !== prevQIdx;
    var optionsJustRevealed = data.optionsRevealed && !prevOptRevealed;

    if (phaseChanged) {
        if (data.phase === 'answer_revealed') sfxReveal();
        if (data.phase === 'question') { lastTimerVal = 999; }
    }

    renderPhase(phaseChanged, newQuestion, optionsJustRevealed);
    renderTimer();
    renderPreCountdown();
    renderMiniScores();
    renderScoreboardOverlay();
}

// ═══════════════ PHASE RENDERING ═══════════════
var currentPhase = 'lobby';

function showPhase(id) {
    if (currentPhase === id) return;
    var outEl = document.getElementById('phase-' + currentPhase);
    currentPhase = id;
    var inEl = document.getElementById('phase-' + id);

    // Use crossfade for smooth transition
    if (outEl) {
        outEl.style.transition = 'opacity 1s ease-in-out';
        outEl.style.opacity = '0';
    }
    setTimeout(function() {
        document.querySelectorAll('.phase').forEach(function(el) {
            el.classList.remove('active');
            el.style.opacity = '';
            el.style.transition = '';
        });
        if (inEl) {
            inEl.style.opacity = '0';
            inEl.classList.add('active');
            void inEl.offsetHeight;
            inEl.style.transition = 'opacity 1s ease-in-out';
            inEl.style.opacity = '1';
            setTimeout(function() {
                inEl.style.transition = '';
                inEl.style.opacity = '';
            }, 1050);
        }
    }, outEl ? 1000 : 0);
}

function renderPhase(phaseChanged, newQuestion, optionsJustRevealed) {
    if (!ps) return;
    var phase = ps.phase;
    var type = ps.roundType;

    document.getElementById('roundLabel').textContent = ps.roundName || '';

    var timerStrip = document.getElementById('timerStrip');
    var timerBig = document.getElementById('timerBig');

    // Hide team results overlay when not in answer_revealed
    if (phase !== 'answer_revealed') {
        document.getElementById('teamResultsOverlay').classList.remove('active');
    }

    if (phase === 'lobby') {
        showPhase('lobby');
        timerStrip.style.display = 'none';
        timerBig.style.display = 'none';
        document.getElementById('roundLogo').style.display = 'none';
        console.log('[DEBUG screen] lobby phase, menuLevel:', ps.menuLevel, 'gameTheme.homeBackground:', ps.gameTheme && ps.gameTheme.homeBackground, 'selectedCategory:', ps.selectedCategory);
        if (ps.gameTheme) applyTheme(ps.gameTheme);
        if (ps.menuLevel === 'home') renderScreenHomeMenu();
        else if (ps.menuLevel === 'category') renderScreenCategoryMenu();
        else renderScreenLobbyDefault();
    } else if (phase === 'waiting') {
        _screenMenuLevel = null;
        showPhase('waiting');
        timerStrip.style.display = 'none';
        timerBig.style.display = 'none';
        document.getElementById('roundLogo').style.display = 'none';
        if (ps.gameTheme) applyTheme(ps.gameTheme);
        var wLogo = document.getElementById('waitingLogo');
        var wLogoSrc = (ps.gameTheme && ps.gameTheme.logo) || null;
        if (wLogoSrc) { wLogo.src = wLogoSrc; wLogo.style.display = ''; }
        else { wLogo.style.display = 'none'; }
    } else if (phase === 'round_intro') {
        showPhase('round-intro');
        timerStrip.style.display = 'none';
        timerBig.style.display = 'none';
        document.getElementById('roundLogo').style.display = 'none';
        renderRoundIntro();
    } else if (phase === 'scoreboard') {
        // Legacy: show as full phase
        showPhase('scoreboard');
        timerStrip.style.display = 'none';
        timerBig.style.display = 'none';
        renderScoreboard();
    } else if (phase === 'answer_revealed') {
        // Stay on question phase — reveal in-place without phase switch
        showPhase('question');
        timerStrip.style.display = 'none';
        timerBig.style.display = 'none';
        renderRevealedInPlace();
        renderTeamResultsOverlay();
    } else if (phase === 'question') {
        showPhase('question');
        var isPulsador = type === 'pulsador';
        timerStrip.style.display = isPulsador ? 'none' : '';
        timerBig.style.display = isPulsador ? 'none' : '';
        renderQuestion(type, newQuestion, optionsJustRevealed);
    } else if (phase === 'round_end') {
        showPhase('round-end');
        timerStrip.style.display = 'none';
        timerBig.style.display = 'none';
        document.getElementById('roundLogo').style.display = 'none';
    } else {
        showPhase('waiting');
        timerStrip.style.display = 'none';
        timerBig.style.display = 'none';
    }

    // No overlay on /screen — projector always shows clean view
    document.getElementById('timerOverlay').classList.remove('active');
}

// ═══════════════ ROUND INTRO ═══════════════
function renderRoundIntro() {
    if (!ps) return;

    // Logo
    var logo = document.getElementById('introLogo');
    var logoSrc = (ps.roundTheme && ps.roundTheme.logo) || (ps.typeTheme && ps.typeTheme.logo) || (ps.gameTheme && ps.gameTheme.logo) || null;
    if (logoSrc) { logo.src = logoSrc; logo.style.display = ''; }
    else { logo.style.display = 'none'; }

    // Background
    var bg = (ps.roundTheme && ps.roundTheme.background) || (ps.typeTheme && ps.typeTheme.background) || null;
    if (bg) {
        var bgLayer = document.getElementById('bgLayer');
        bgLayer.className = 'bg-layer';
        bgLayer.style.cssText = '';
        if (bg.startsWith('#')) { bgLayer.style.background = bg; }
        else if (bg.startsWith('linear') || bg.startsWith('radial')) {
            bgLayer.style.background = bg; bgLayer.style.backgroundSize = '300% 300%'; bgLayer.classList.add('bg-gradient-anim');
        } else if (bg.startsWith('/') || bg.startsWith('http')) {
            bgLayer.style.backgroundImage = 'url(' + bg + ')'; bgLayer.classList.add('bg-image-cover');
        }
    }
}

// ═══════════════ QUESTION ═══════════════
function renderQuestion(type, newQuestion, optionsJustRevealed) {
    var q = ps.question;
    if (!q) return;
    var c = q.content || {};
    var stmtEl = document.getElementById('qStatement');

    stmtEl.textContent = c.statement || '';

    // Animate statement entrance on new question
    if (newQuestion) {
        GSA.resetStatement(stmtEl);
        GSA.enterStatement(stmtEl);
    }

    // Media (precio uses its own image inside priceAnswers container)
    var media = document.getElementById('qMedia');
    if (q.media_url && type !== 'precio') { media.src = q.media_url; media.style.display = ''; }
    else { media.style.display = 'none'; }

    // Hide all type-specific
    document.getElementById('qOptions').style.display = 'none';
    document.getElementById('buzzerQueue').style.display = 'none';
    document.getElementById('priceAnswers').style.display = 'none';
    document.getElementById('boomItems').style.display = 'none';
    document.getElementById('imgGrid').style.display = 'none';
    document.getElementById('letterPanel').style.display = 'none';
    document.getElementById('pulsadorScreen').style.display = 'none';
    document.getElementById('ruletaScreenPanel').style.display = 'none';

    if (type === 'multirespuesta') {
        renderMultiOptions(c, optionsJustRevealed, stmtEl);
    } else if (type === 'imagen') {
        renderImageGrid(c, q);
        renderBuzzerQueue();
        document.getElementById('buzzerQueue').style.display = 'flex';
    } else if (type === 'ruleta') {
        renderRuletaScreen(c, q, newQuestion);
    } else if (type === 'pulsador') {
        renderPulsadorScreen();
    } else if (type === 'cancion' || type === 'imagen_fija') {
        renderBuzzerQueue();
        document.getElementById('buzzerQueue').style.display = 'flex';
    } else if (type === 'precio') {
        renderPrecioScreen(c, q, newQuestion);
    } else if (type === 'boom') {
        renderBoomItems(c);
    }
}

function renderMultiOptions(c, optionsJustRevealed, stmtEl) {
    var opts = c.options || [];
    var container = document.getElementById('qOptions');
    if (!opts.length || (ps && !ps.optionsRevealed)) {
        container.style.display = 'none';
        return;
    }
    container.style.display = 'grid';
    // Adaptive grid: 2→1col, 3→3col, 4→2×2, 5+→3col
    container.classList.remove('cols-1', 'cols-3');
    if (opts.length <= 2) container.classList.add('cols-1');
    else if (opts.length === 3 || opts.length >= 5) container.classList.add('cols-3');
    var letters = ['A', 'B', 'C', 'D', 'E', 'F'];
    container.innerHTML = opts.map(function(o, i) {
        return '<div class="q-opt"><span class="opt-letter">' + letters[i] + '</span>' + esc(o) + '</div>';
    }).join('');

function renderRevealed() {
    if (!ps || !ps.question) return;
    var c = ps.question.content || {};
    var type = ps.roundType;

    var revOpts = document.getElementById('revOptions');
    revOpts.style.display = 'none';

    if (type === 'multirespuesta') {
        var opts = c.options || [];
        var correct = c.correct;
        var letters = ['A', 'B', 'C', 'D', 'E', 'F'];
        var correctIndices = Array.isArray(correct) ? correct : (typeof correct === 'number' ? [correct] : []);
        document.getElementById('revAnswer').textContent = correctIndices.map(function(i) { return letters[i] + ' — ' + (opts[i] || ''); }).join(', ');
        revOpts.style.display = 'grid';
        revOpts.innerHTML = opts.map(function(o, i) {
            var isCorrect = correctIndices.indexOf(i) >= 0;
            return '<div class="rev-opt' + (isCorrect ? ' correct' : '') + '">' +
                '<span class="opt-letter">' + letters[i] + '</span>' + esc(o) + '</div>';
        }).join('');

        // Apply shared animations: glow correct, dim wrong
        GSA.revealAnswer(revOpts, '.rev-opt.correct', '.rev-opt:not(.correct)');
    } else if (type === 'precio') {
        document.getElementById('revAnswer').textContent = c.correct_value || c.answer || '';
    } else if (type === 'boom') {
        var order = c.correct_order || [];
        var items = c.items || [];
        document.getElementById('revAnswer').textContent = order.map(function(i) { return items[i] || i; }).join(' → ') || c.answer || '';
    } else {
        document.getElementById('revAnswer').textContent = c.answer || '';
    }

    renderMiniScores();
    renderTeamResultsOverlay();
}

// ═══════════════ REVEAL IN-PLACE (on question phase) ═══════════════
function renderRevealedInPlace() {
    if (!ps || !ps.question) return;
    var c = ps.question.content || {};
    var type = ps.roundType;

    if (type === 'multirespuesta') {
        var opts = c.options || [];
        var correct = c.correct;
        var correctIndices = Array.isArray(correct) ? correct : (typeof correct === 'number' ? [correct] : []);
        var container = document.getElementById('qOptions');
        // Ensure options are shown (they may already be from question phase)
        if (!container.children.length) {
            var letters = ['A', 'B', 'C', 'D', 'E', 'F'];
            container.innerHTML = opts.map(function(o, i) {
                return '<div class="q-opt"><span class="opt-letter">' + letters[i] + '</span>' + esc(o) + '</div>';
            }).join('');
        }
        container.style.display = 'grid';
        // Apply correct/dimmed classes with transition
        var optEls = container.querySelectorAll('.q-opt');
        optEls.forEach(function(el, i) {
            el.classList.remove('correct', 'dimmed');
            if (correctIndices.indexOf(i) >= 0) {
                el.classList.add('correct');
            } else {
                el.classList.add('dimmed');
            }
        });
    } else if (type === 'boom') {
        var items = c.items || [];
        var order = c.correct_order || [];
        var container = document.getElementById('boomItems');
        container.style.display = 'flex';
        // Re-render in correct order with arrows between items
        var html = '';
        order.forEach(function(origIdx, pos) {
            if (pos > 0) html += '<div class="boom-arrow">↓</div>';
            html += '<div class="boom-item correct"><span class="boom-num">' + (pos + 1) + '</span>' + esc(items[origIdx] || '') + '</div>';
        });
        container.innerHTML = html;
    } else if (type === 'precio') {
        renderPrecioRevealScreen();
    } else {
        // For other types, fall back to legacy revealed phase
        renderRevealed();
        showPhase('revealed');
    }
}

// ═══════════════ TEAM RESULTS OVERLAY ═══════════════
function renderTeamResultsOverlay() {
    var overlay = document.getElementById('teamResultsOverlay');
    if (!ps) { overlay.classList.remove('active'); return; }
    if (ps.phase !== 'answer_revealed' || !ps.showTeamResults) {
        overlay.classList.remove('active');
        return;
    }
    var lqs = ps.lastQuestionScores || {};
    var equipos = ps.equipos || [];
    var c = ps.question ? (ps.question.content || {}) : {};
    var type = ps.roundType;
    var letters = ['A','B','C','D','E','F','G','H'];

    var html = '';
    equipos.forEach(function(eq) {
        var r = lqs[eq.id] || { answer: null, correct: false, points: 0, noAnswer: true };
        var icon = r.noAnswer ? '&#9899;' : (r.correct ? '&#9989;' : '&#10060;');
        var cardClass = r.noAnswer ? 'no-answer' : (r.correct ? 'correct' : 'wrong');

        var ansText = '';
        if (r.noAnswer) {
            ansText = 'Sin respuesta';
        } else if (type === 'multirespuesta' && c.options) {
            var picks = Array.isArray(r.answer) ? r.answer : [r.answer];
            ansText = picks.map(function(i) { return letters[i] + ' — ' + (c.options[i] || ''); }).join(', ');
        } else if (type === 'precio') {
            ansText = String(r.answer);
        } else if (type === 'boom' && c.items) {
            var order = Array.isArray(r.answer) ? r.answer : [];
            ansText = order.map(function(i) { return c.items[i] || i; }).join(' → ');
        } else {
            ansText = String(r.answer || '');
        }

        var ptsClass = r.points > 0 ? 'positive' : (r.points < 0 ? 'negative' : 'zero');
        var ptsText = r.points > 0 ? '+' + r.points : String(r.points);
        var photoHtml = eq.photo_url
            ? '<img class="tr-photo" src="' + esc(eq.photo_url) + '">'
            : '<div class="tr-photo" style="display:flex;align-items:center;justify-content:center;font-size:24px;">&#128100;</div>';

        html += '<div class="tr-card ' + cardClass + '">'
            + '<span class="tr-icon">' + icon + '</span>'
            + photoHtml
            + '<span class="tr-name">' + esc(eq.nombre) + '</span>'
            + '<span class="tr-answer-text">' + esc(ansText) + '</span>'
            + '<span class="tr-pts ' + ptsClass + '">' + ptsText + '</span>'
            + '</div>';
    });

    document.getElementById('teamResultsCards').innerHTML = html;
    overlay.classList.add('active');
}

    var rows = Object.keys(scores).map(function(tid) {
        var eq = equipos.find(function(e) { return e.id === tid; });
        return { id: tid, name: eq ? eq.nombre : tid, photo_url: eq ? eq.photo_url : null, score: scores[tid] || 0 };
    });
    rows.sort(function(a, b) { return b.score - a.score; });

    var maxScore = rows.length > 0 ? Math.max(rows[0].score, 1) : 1;
    var trophies = ['\u{1F3C6}', '\u{1F948}', '\u{1F949}'];

    var html = rows.map(function(r, i) {

            '<div class="sb-pos">' + (i < 3 ? trophies[i] : (i + 1)) + '</div>' +
            photoHtml +
            '<div class="sb-name">' + esc(r.name) + '</div>' +
            '<div class="sb-bar"><div class="sb-bar-fill" style="width:' + pct + '%"></div></div>' +

// ═══════════════ THEME ENGINE ═══════════════
var GRADIENT_PRESETS = {
    nightSky:  'linear-gradient(135deg, #1a1a3e, #12123a, #0a0a2a, #1a1a3e)',
    deepOcean: 'linear-gradient(135deg, #0c2340, #0a1628, #0d2137, #0c2340)',
    sunset:    'linear-gradient(135deg, #1a0a2e, #2d1b3d, #4a1942, #2d1b3d, #1a0a2e)',
    aurora:    'linear-gradient(135deg, #0a1628, #0d2137, #1a3a2a, #0d2137, #0a1628)',
    neon:      'linear-gradient(135deg, #0a0020, #1a0040, #300060, #1a0040, #0a0020)',
    forest:    'linear-gradient(135deg, #0a1a0a, #0d2a0d, #051505, #0a1a0a)',
    fire:      'linear-gradient(135deg, #2a0a00, #3a1500, #1a0500, #2a0a00)',
};
var currentTheme = {};

function applyTheme(theme) {
    if (!theme || JSON.stringify(theme) === JSON.stringify(currentTheme)) return;
    currentTheme = theme;
    var root = document.documentElement;

    if (theme.primaryColor) {
        root.style.setProperty('--cyan', theme.primaryColor);
        var r = parseInt(theme.primaryColor.slice(1,3),16), g = parseInt(theme.primaryColor.slice(3,5),16), b = parseInt(theme.primaryColor.slice(5,7),16);
        root.style.setProperty('--glow-cyan', '0 0 20px rgba('+r+','+g+','+b+',.4), 0 0 60px rgba('+r+','+g+','+b+',.15)');
    }
    if (theme.secondaryColor) {
        root.style.setProperty('--gold', theme.secondaryColor);
        var r2 = parseInt(theme.secondaryColor.slice(1,3),16), g2 = parseInt(theme.secondaryColor.slice(3,5),16), b2 = parseInt(theme.secondaryColor.slice(5,7),16);
        root.style.setProperty('--glow-gold', '0 0 20px rgba('+r2+','+g2+','+b2+',.4), 0 0 60px rgba('+r2+','+g2+','+b2+',.15)');
    }

    var bgLayer = document.getElementById('bgLayer');
    bgLayer.className = 'bg-layer';
    bgLayer.style.cssText = '';

    if (theme.backgroundType === 'color' && theme.backgroundColor) {
        root.style.setProperty('--bg', theme.backgroundColor);
        bgLayer.style.background = theme.backgroundColor;
    } else if (theme.backgroundType === 'gradient') {
        var grad = GRADIENT_PRESETS[theme.backgroundGradient] || theme.backgroundGradient || '';
        if (grad) {
            bgLayer.style.background = grad;
            bgLayer.style.backgroundSize = '300% 300%';
            bgLayer.classList.add('bg-gradient-anim');
        }
    } else if (theme.backgroundType === 'image' && theme.backgroundImage) {
        bgLayer.style.backgroundImage = 'url(' + theme.backgroundImage + ')';
        bgLayer.classList.add('bg-image-cover');
    }

    var logo = document.getElementById('gameLogo');
    if (theme.logo) { logo.src = theme.logo; logo.style.display = ''; }
    else { logo.style.display = 'none'; }

    createParticles(theme.primaryColor || '#00d4ff');
}

function applyRoundTheme(roundTheme) {
    var logo = document.getElementById('roundLogo');
    if (roundTheme && roundTheme.logo) { logo.src = roundTheme.logo; logo.style.display = ''; }
    else { logo.style.display = 'none'; }

    if (roundTheme && roundTheme.background) {
        var bg = roundTheme.background;
        var bgLayer = document.getElementById('bgLayer');
        bgLayer.className = 'bg-layer';
        bgLayer.style.cssText = '';
        if (bg.startsWith('#')) { bgLayer.style.background = bg; }
        else if (bg.startsWith('linear') || bg.startsWith('radial')) {
            bgLayer.style.background = bg; bgLayer.style.backgroundSize = '300% 300%'; bgLayer.classList.add('bg-gradient-anim');
        } else if (bg.startsWith('/') || bg.startsWith('http')) {
            bgLayer.style.backgroundImage = 'url(' + bg + ')'; bgLayer.classList.add('bg-image-cover');
        }
    }
}

// ═══════════════ PARTICLES ═══════════════
function createParticles(color) {
    var container = document.getElementById('particles');

    for (var i = 0; i < 25; i++) {
        var p = document.createElement('div');

        var size = 2 + Math.random() * 4;
        p.style.cssText = 'width:' + size + 'px;height:' + size + 'px;left:' + (Math.random()*100) + '%;' +
            'background:' + c + ';animation-duration:' + (8+Math.random()*12) + 's;animation-delay:' + (Math.random()*10) + 's;' +
            'box-shadow:0 0 ' + (size*2) + 'px ' + c + ';';
        container.appendChild(p);
    }
}

// ═══════════════ SOUND ENGINE ═══════════════
var audioCtx = null;
function initAudioCtx() {
    if (audioCtx) return;
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}
function playTone(freq, duration, type, vol) {
    initAudioCtx();
    if (!audioCtx) return;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol || 0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function sfxBlock() { playTone(150, 0.2, 'square', 0.08); setTimeout(function(){ playTone(100, 0.3, 'square', 0.06); }, 150); }

// ═══════════════ MENU RENDERING ═══════════════
var TYPE_LABELS = {
    multirespuesta: 'Multirespuesta', pulsador: 'Pulsador', precio: 'Precio Justo',
    imagen: 'Adivina Imagen', cancion: 'Cancion', boom: 'Boom',
    ruleta: 'Ruleta', imagen_fija: 'Imagen Fija'
};

function renderScreenLobbyDefault() {
    _screenMenuLevel = null;
    var el = document.getElementById('phase-lobby');
    var gt = ps.gameTheme || {};
    var logoEl = document.getElementById('gameLogo');
    if (gt.logo) { logoEl.src = gt.logo; logoEl.style.display = ''; } else { logoEl.style.display = 'none'; }
    document.getElementById('lobbyTitle').style.display = '';
    document.querySelector('.lobby-sub').style.display = '';
    var menuEl = document.getElementById('screenMenuContainer');
    if (menuEl) menuEl.style.display = 'none';
    // Reset bgLayer to game base background (clear any menu background)
    currentTheme = {}; if (ps.gameTheme) applyTheme(ps.gameTheme);
}

function getScreenCategories() {
    var rounds = ps.rounds || [];
    var cats = {};
    rounds.forEach(function(r) {
        if (!cats[r.type]) cats[r.type] = [];
        cats[r.type].push(r);
    });
    return cats;
}

// Apply a menu-level background image on top of the base game background
function applyMenuBackground(imgUrl) {
    var bgLayer = document.getElementById('bgLayer');
    if (!bgLayer) return;
    console.log('[DEBUG screen] applyMenuBackground:', imgUrl);
    if (imgUrl) {
        bgLayer.className = 'bg-layer bg-image-cover';
        bgLayer.style.cssText = '';
        bgLayer.style.backgroundImage = 'url("' + imgUrl + '")';
    }
    // If no imgUrl, the base game theme background (already applied) stays
}

var _screenMenuLevel = null; // track for transitions

function renderScreenHomeMenu() {
    var gt = ps.gameTheme || {};
    var cats = getScreenCategories();
    var catKeys = Object.keys(cats);
    var completedRounds = ps.completedRounds || [];

    // Hide default lobby elements
    document.getElementById('lobbyTitle').style.display = 'none';
    document.querySelector('.lobby-sub').style.display = 'none';
    document.getElementById('gameLogo').style.display = 'none';

    // Apply home background: homeBackground → fall through to game background (already applied)
    console.log('[DEBUG screen] renderScreenHomeMenu — gt.homeBackground:', gt.homeBackground, 'gt.types:', JSON.stringify(gt.types));
    if (gt.homeBackground) applyMenuBackground(gt.homeBackground);

    var container = document.getElementById('screenMenuContainer');
    if (!container) {
        container = document.createElement('div');
        container.id = 'screenMenuContainer';
        document.getElementById('phase-lobby').appendChild(container);
    }
    container.style.display = '';
    _screenMenuLevel = 'home';

    var html = '<div class="screen-menu fade-out">';
    if (gt.logo) html += '<img class="screen-menu-logo" src="' + esc(gt.logo) + '" onerror="this.style.display=\'none\'">';
    html += '<div class="screen-menu-grid menu-categories" data-count="' + Math.min(catKeys.length, 6) + '">';
    catKeys.forEach(function(type) {
        var typeLogo = (gt.types && gt.types[type] && gt.types[type].logo) || null;
        var allCompleted = cats[type].every(function(r) { return completedRounds.indexOf(r.id) >= 0; });
        var cls = allCompleted ? 'screen-menu-item completed' : 'screen-menu-item';
        html += '<div class="' + cls + '">';
        if (typeLogo) html += '<img src="' + esc(typeLogo) + '" onerror="this.style.display=\'none\'">';
        else html += '<div style="font-size:48px;opacity:.4">&#127919;</div>';
        html += '</div>';
    });
    html += '</div></div>';
    container.innerHTML = html;

    requestAnimationFrame(function() {
        var menu = container.querySelector('.screen-menu');
        if (menu) menu.classList.remove('fade-out');
    });
}

function renderScreenCategoryMenu() {
    var gt = ps.gameTheme || {};
    var category = ps.selectedCategory;
    var rounds = (ps.rounds || []).filter(function(r) { return r.type === category; });
    var completedRounds = ps.completedRounds || [];
    var typeLogo = (gt.types && gt.types[category] && gt.types[category].logo) || null;
    var typeBg = (gt.types && gt.types[category] && gt.types[category].background) || null;

    // Hide default lobby elements
    document.getElementById('lobbyTitle').style.display = 'none';
    document.querySelector('.lobby-sub').style.display = 'none';
    document.getElementById('gameLogo').style.display = 'none';

    // Apply category background: type bg → homeBackground → game background (already applied)
    console.log('[DEBUG screen] renderScreenCategoryMenu — category:', category, 'typeBg:', typeBg, 'homeBackground:', gt.homeBackground);
    if (typeBg) applyMenuBackground(typeBg);
    else if (gt.homeBackground) applyMenuBackground(gt.homeBackground);

    var container = document.getElementById('screenMenuContainer');
    if (!container) {
        container = document.createElement('div');
        container.id = 'screenMenuContainer';
        document.getElementById('phase-lobby').appendChild(container);
    }
    container.style.display = '';

    _screenMenuLevel = 'category';

    var html = '<div class="screen-menu fade-out">';
    if (typeLogo) html += '<img class="screen-menu-logo" src="' + esc(typeLogo) + '" onerror="this.style.display=\'none\'">';
    html += '<div class="screen-menu-grid menu-rounds" data-count="' + Math.min(rounds.length, 6) + '">';
    rounds.forEach(function(r) {
        var roundLogo = r.logo || null;
        var isCompleted = completedRounds.indexOf(r.id) >= 0;
        var cls = isCompleted ? 'screen-menu-item completed' : 'screen-menu-item';
        html += '<div class="' + cls + '">';
        if (roundLogo) html += '<img src="' + esc(roundLogo) + '" onerror="this.style.display=\'none\'">';
        else if (typeLogo) html += '<img src="' + esc(typeLogo) + '" style="opacity:.3" onerror="this.style.display=\'none\'">';
        else html += '<div style="font-size:48px;opacity:.4">&#127919;</div>';
        html += '</div>';
    });
    html += '</div></div>';
    container.innerHTML = html;

    requestAnimationFrame(function() {
        var menu = container.querySelector('.screen-menu');
        if (menu) menu.classList.remove('fade-out');
    });
}

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameShow</title>
<style>
:root { --bg: #0f0f17; --surface: #1a1a24; --border: #2a2a3a; --text: #e4e4e7; --text2: #9898a6; --accent: #00d4ff; --gold: #ffd700; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.wrap { text-align: center; padding: 32px 24px; max-width: 480px; width: 100%; }
h1 { font-size: 42px; color: var(--accent); text-transform: uppercase; letter-spacing: 4px; margin-bottom: 8px; text-shadow: 0 0 30px rgba(0,212,255,.3); }
.sub { color: var(--text2); font-size: 15px; margin-bottom: 48px; }
.cards { display: flex; flex-direction: column; gap: 16px; }
a.card { display: flex; align-items: center; gap: 16px; text-decoration: none; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; transition: border-color .15s, box-shadow .15s; }
a.card:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(0,212,255,.12); }
.icon { font-size: 32px; flex-shrink: 0; width: 48px; text-align: center; }
.info { text-align: left; }
.info strong { display: block; font-size: 17px; color: var(--text); margin-bottom: 2px; }
.info span { font-size: 13px; color: var(--text2); }
.footer { margin-top: 48px; font-size: 12px; color: var(--text2); }
.footer a { color: var(--accent); text-decoration: none; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
    <h1>GameShow</h1>
    <p class="sub">Concursos interactivos en directo</p>
    <div class="cards">
        <a class="card" href="/play">
            <div class="icon">🎮</div>
            <div class="info">
                <strong>Jugar</strong>
                <span>Entra como equipo desde tu tablet o movil</span>
            </div>
        </a>
        <a class="card" href="/admin">
            <div class="icon">⚙️</div>
            <div class="info">
                <strong>Administrar</strong>
                <span>Crea y configura juegos, rondas y preguntas</span>
            </div>
        </a>
    </div>
    <div class="footer">
        <a href="/shared/guia.html">Guia para monitores</a>
    </div>
</div>
</body>
</html>

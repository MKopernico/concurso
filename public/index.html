<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameShow</title>
<style>
:root { --bg: #0f0f17; --surface: #1a1a24; --border: #2a2a3a; --text: #e4e4e7; --text2: #9898a6; --accent: #00d4ff; --gold: #ffd700; --success: #22c55e; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.wrap { text-align: center; padding: 32px 24px; max-width: 520px; width: 100%; }
h1 { font-size: 42px; color: var(--accent); text-transform: uppercase; letter-spacing: 4px; margin-bottom: 8px; text-shadow: 0 0 30px rgba(0,212,255,.3); }
.sub { color: var(--text2); font-size: 15px; margin-bottom: 48px; }

/* Main role cards */
.cards { display: flex; flex-direction: column; gap: 16px; }
a.card, .card-btn { display: flex; align-items: center; gap: 16px; text-decoration: none; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; transition: border-color .15s, box-shadow .15s; cursor: pointer; color: var(--text); }
a.card:hover, .card-btn:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(0,212,255,.12); }
.icon { font-size: 32px; flex-shrink: 0; width: 48px; text-align: center; }
.info { text-align: left; }
.info strong { display: block; font-size: 17px; color: var(--text); margin-bottom: 2px; }
.info span { font-size: 13px; color: var(--text2); }

/* Coordinator panel */
#coordPanel { display: none; margin-top: 24px; }
#coordPanel h3 { font-size: 16px; color: var(--accent); margin-bottom: 16px; }
.game-row { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
.game-row .game-name { flex: 1; font-weight: 600; font-size: 15px; text-align: left; }
.game-row .game-date { font-size: 12px; color: var(--text2); }
.game-actions { display: flex; gap: 8px; }
.btn { font-family: inherit; font-size: 12px; font-weight: 600; border: none; border-radius: 6px; padding: 7px 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; transition: .15s; text-decoration: none; white-space: nowrap; }
.btn-accent { background: var(--accent); color: #000; }
.btn-accent:hover { opacity: .85; }
.btn-success { background: var(--success); color: #000; }
.btn-success:hover { opacity: .85; }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--text2); color: var(--text); }
.empty-msg { color: var(--text2); font-size: 13px; padding: 20px; }
.back-link { display: inline-block; margin-top: 16px; color: var(--accent); cursor: pointer; font-size: 13px; text-decoration: none; }
.back-link:hover { text-decoration: underline; }

.footer { margin-top: 48px; font-size: 12px; color: var(--text2); }
.footer a { color: var(--accent); text-decoration: none; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
    <h1>GameShow</h1>
    <p class="sub">Concursos interactivos en directo</p>

    <div class="cards" id="mainCards">
        <a class="card" href="/play">
            <div class="icon">&#127918;</div>
            <div class="info">
                <strong>Soy jugador</strong>
                <span>Entra como equipo desde tu tablet o movil</span>
            </div>
        </a>
        <div class="card-btn" onclick="showCoordPanel()">
            <div class="icon">&#127908;</div>
            <div class="info">
                <strong>Soy coordinador</strong>
                <span>Dirige el juego y controla la pantalla de sala</span>
            </div>
        </div>
    </div>

    <div id="coordPanel">
        <h3>&#127908; Juegos con sesion activa</h3>
        <div id="coordGamesList"></div>
        <a class="back-link" onclick="hideCoordPanel()">&#9664; Volver</a>
    </div>

    <div class="footer">
        <a href="/admin">Backoffice</a>
    </div>
</div>

<script>
function showCoordPanel() {
    document.getElementById('mainCards').style.display = 'none';
    document.getElementById('coordPanel').style.display = 'block';
    loadActiveGames();
}
function hideCoordPanel() {
    document.getElementById('mainCards').style.display = '';
    document.getElementById('coordPanel').style.display = 'none';
}

async function loadActiveGames() {
    var el = document.getElementById('coordGamesList');
    el.innerHTML = '<div class="empty-msg">Cargando...</div>';
    try {
        var res = await fetch('/api/active-games');
        var games = await res.json();
        if (!games.length) {
            el.innerHTML = '<div class="empty-msg">No hay juegos con sesion activa.<br>Inicia una sesion desde el <a href="/admin" style="color:var(--accent)">backoffice</a>.</div>';
            return;
        }
        el.innerHTML = games.map(function(g) {
            return '<div class="game-row">'
                + '<span class="game-name">' + esc(g.name) + '</span>'
                + (g.date ? '<span class="game-date">' + g.date + '</span>' : '')
                + '<div class="game-actions">'
                + '<a class="btn btn-accent" href="/director/' + g.id + '" target="_blank">Abrir director</a>'
                + '<a class="btn btn-ghost" href="/screen/' + g.id + '" target="_blank">Pantalla de sala</a>'
                + '</div></div>';
        }).join('');
    } catch(e) {
        el.innerHTML = '<div class="empty-msg">Error cargando juegos</div>';
    }
}

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
</script>
</body>
</html>
